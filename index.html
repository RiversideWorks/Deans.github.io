<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Services</title>
    <style>
        body {
            background-color: #000;
            color: #555;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
        }
        .menu-container {
            width: 100%;
            max-width: 800px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        .menu-item:hover {
            color: #fff;
        }
        .number {
            font-size: 24px;
            margin-right: 40px;
            color: #555;
        }
        .label {
            font-size: 48px;
            font-weight: 500;
            transition: transform 0.3s;
        }
        .menu-item:hover .label {
            transform: translateX(10px);
        }
        .arrow {
            margin-left: 20px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }
        .menu-item:hover .arrow {
            opacity: 1;
            transform: translateX(10px);
        }
        .image-popup {
            position: absolute;
            top: -50px;
            right: 100px;
            width: 250px;
            height: 200px;
            background-color: #fff;
            border-radius: 20px;
            display: none;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div class="menu-item" onmouseover="showImage(this, 'https://images.unsplash.com/photo-1626785774573-4b799315345d?auto=format&fit=crop&w=500&q=80')" onmouseout="hideImage(this)">
        <div class="number">01</div>
        <div class="label">Graphic Design</div>
        <div class="image-popup"></div>
    </div>
    <div class="menu-item" onmouseover="showImage(this, 'https://images.unsplash.com/photo-1586717791821-3f44a563fa28?auto=format&fit=crop&w=500&q=80')" onmouseout="hideImage(this)">
        <div class="number">02</div>
        <div class="label">UI/UX Design <span class="arrow">→</span></div>
        <div class="image-popup"></div>
    </div>
    <div class="menu-item" onmouseover="showImage(this, 'https://images.unsplash.com/photo-1600132806670-3483253a38d7?auto=format&fit=crop&w=500&q=80')" onmouseout="hideImage(this)">
        <div class="number">03</div>
        <div class="label">Branding</div>
        <div class="image-popup"></div>
    </div>
    <div class="menu-item" onmouseover="showImage(this, 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?auto=format&fit=crop&w=500&q=80')" onmouseout="hideImage(this)">
        <div class="number">04</div>
        <div class="label">Motion Graphic</div>
        <div class="image-popup"></div>
    </div>
</div>

<script>
    function showImage(element, imageUrl) {
        const popup = element.querySelector('.image-popup');
        popup.style.backgroundImage = 'url(' + imageUrl + ')';
        popup.style.display = 'block';
    }
    function hideImage(element) {
        const popup = element.querySelector('.image-popup');
        popup.style.display = 'none';
    }
</script>

</body>
</html>
