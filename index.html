<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    nav {
      background: #1a1a1a;
      border-radius: 50px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 680px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .logo {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-right: 8px;
      padding: 6px 10px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 30px;
      display: inline-block;
    }

    .nav-links a .text-wrap {
      display: inline-flex;
      flex-direction: column;
      height: 1.2em;
      overflow: hidden;
      vertical-align: middle;
    }

    .nav-links a .text-wrap span {
      display: block;
      line-height: 1.2em;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), color 0.35s ease;
      color: #aaa;
    }

    .nav-links a .text-wrap span.duplicate {
      color: #fff;
    }

    .nav-links a:hover .text-wrap span {
      transform: translateY(-100%);
    }

    .cta {
      margin-left: auto;
      flex-shrink: 0;
    }

    .cta a {
      background: #fff;
      color: #111;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: 30px;
      display: inline-block;
      transition: background 0.2s, transform 0.15s;
    }

    .cta a:hover {
      background: #e8e8e8;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Zynic</div>

    <div class="nav-links">
      <a href="#"><span class="text-wrap"><span>Work</span><span class="duplicate">Work</span></span></a>
      <a href="#"><span class="text-wrap"><span>Services</span><span class="duplicate">Services</span></span></a>
      <a href="#"><span class="text-wrap"><span>Awards</span><span class="duplicate">Awards</span></span></a>
      <a href="#"><span class="text-wrap"><span>Pricing</span><span class="duplicate">Pricing</span></span></a>
      <a href="#"><span class="text-wrap"><span>Benefits</span><span class="duplicate">Benefits</span></span></a>
    </div>

    <div class="cta">
      <a href="#">See pricing</a>
    </div>
  </nav>

</body>
</html>
