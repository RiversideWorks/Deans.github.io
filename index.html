<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 80px 20px;
      background: #1e293b;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .section {
      padding: 60px 20px;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 10px;
    }

    footer {
      padding: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome 🚀</h1>
    <p>This is my modern GitHub website</p>
  </header>

  <div class="section">
    <div class="card">
      <h2>About Me</h2>
      <p>This is where you describe yourself or your project.</p>
    </div>

    <div class="card">
      <h2>Projects</h2>
      <p>Add your work or ideas here.</p>
    </div>

    <div class="card">
      <h2>Contact</h2>
      <p>Email or social links go here.</p>
    </div>
  </div>

  <footer>
    © 2026 My Website
  </footer>

</body>
</html>
